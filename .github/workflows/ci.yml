name: CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Install testing tools
      - name: Install Testing Tools
        run: |
          pip install pytest flake8

      # Step 5: Run code quality check (extra marks 🔥)
      - name: Run Lint Check
        run: |
          flake8 .

      # Step 6: Run tests (FIXED 🔥)
      - name: Run Tests
        run: |
          PYTHONPATH=. pytest